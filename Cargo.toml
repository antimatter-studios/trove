[workspace]
resolver = "2"
members = ["crates/sdpm-core", "crates/sdpm-cli", "crates/sdpmd"]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.75"

[workspace.dependencies]
sdpm-core = { path = "crates/sdpm-core" }
keepass = "0.7"
zeroize = { version = "1", features = ["zeroize_derive"] }
thiserror = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
rpassword = "7"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
lto = "thin"
strip = "symbols"

# Vendored fork of the `keepass` crate. The published 0.7.33 parses
# `<Binary Ref="..."/>` references inside entries but discards them
# ("TODO reference into a binary field from the Meta") and panics on
# non-UTF-8 `Value::Bytes` during save. Our fork resolves both so binary
# attachments round-trip as real KDBX4 inner-header binaries — restoring
# bit-exact KeePassXC interoperability. See `vendor/keepass/`.
[patch.crates-io]
keepass = { path = "vendor/keepass" }
