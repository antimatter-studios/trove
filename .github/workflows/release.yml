# trove release pipeline
#
# Fires when a `vX.Y.Z` tag is pushed (or via manual dispatch against an
# existing tag). It builds the `trove` + `troved` CLI binaries AND the Tauri
# desktop bundles (macOS universal / Linux / Windows) on native runners and
# attaches them all — CLI tarballs, desktop .dmg/.deb/.AppImage/.exe, plus a
# single SHA256SUMS — to one GitHub Release `trove vX.Y.Z`. It also publishes
# trove-core to crates.io. CLI and desktop share one version + one release.
#
# Homebrew is NOT published from here. The antimatter-studios/homebrew-tap repo
# PULLS a tagged version (rendering its own formula from this Release's
# artifacts + checksums) on its own trigger, so this repo never pushes to the
# tap and needs no cross-repo token.
#
# Targets — all built on NATIVE runners, so there's no cross-compilation:
#   * darwin-arm64    (macos-15)        aarch64-apple-darwin
#   * darwin-x86_64   (macos-15-intel)  x86_64-apple-darwin
#   * linux-x86_64    (ubuntu-latest)   x86_64-unknown-linux-gnu
#   * linux-arm64     (ubuntu-24.04-arm) aarch64-unknown-linux-gnu
#
# Windows: trove's IPC is Unix-domain-socket based (control, ssh-agent and
# gpg-agent sockets). Windows users run trove under WSL2 — a real Linux
# kernel — so the linux-* artifacts cover them. There is no native Windows
# target here (Homebrew doesn't run on Windows anyway). See docs and the
# README "Windows (WSL)" note.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release, e.g. v0.4.0"
        required: true
      crate_only:
        description: "Only (re)publish trove-core to crates.io — skip the binary rebuild + GitHub Release (targeted retry)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Gate the release on a green test run. Re-uses the same suite CI runs, so a
  # tag pushed past a broken main never ships.
  test:
    name: Test before release
    runs-on: ubuntu-latest
    if: ${{ !inputs.crate_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system tools
        # keepassxc-cli is the mandatory cross-tool conformance oracle — the
        # matrix tests hard-fail (never skip) if it's absent, so the release
        # gate must install it just like CI does.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gnupg \
            git \
            openssh-client \
            keepassxc

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2.7.3
        with:
          shared-key: release-test

      - name: cargo test
        run: cargo test --workspace --locked

      - name: Conformance matrix (keepass-spec-tests)
        # Separate workspace (own Cargo.lock), so `--workspace` above skips it.
        # It drives the trove CLI as a subprocess — build it and point TROVE_BIN.
        run: |
          cargo build --locked -p trove-cli
          TROVE_BIN="$PWD/target/debug/trove" \
            cargo test --manifest-path crates/keepass-spec-tests/Cargo.toml --locked

  build:
    name: Build ${{ matrix.label }}
    needs: test
    if: ${{ !inputs.crate_only }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: darwin-arm64
            os: macos-15
            target: aarch64-apple-darwin
          - label: darwin-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # Windows builds the native target (trove.exe / troved.exe over named
          # pipes). Not consumed by Homebrew (Unix-only); shipped as a .zip on
          # the GitHub Release for direct download. WSL users take a linux-*
          # build instead.
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2.7.3
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        # TROVE_RELEASE makes build.rs stamp the plain version (e.g. 0.6.0) into
        # both binaries instead of a per-binary `-dev-<timestamp>`, so `trove`
        # and `troved` match and the CLI↔daemon drift check never fires on a
        # released build.
        env:
          TROVE_RELEASE: "1"
        run: cargo build --release --locked --target ${{ matrix.target }} -p trove-cli -p troved

      # Checksums are computed centrally on Ubuntu (the release job) where
      # `shasum` is reliable, so packaging here is archive-only.
      - name: Package tarball (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eux
          RAW="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${RAW#v}"
          NAME="trove-${VERSION}-${{ matrix.label }}"
          BIN="target/${{ matrix.target }}/release"
          mkdir -p staging
          cp "${BIN}/trove" "${BIN}/troved" staging/
          tar czf "${NAME}.tar.gz" -C staging trove troved

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $raw = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $raw -replace '^v', ''
          $name = "trove-$version-${{ matrix.label }}"
          $bin = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "$bin/trove.exe","$bin/troved.exe" staging/
          Compress-Archive -Path staging/* -DestinationPath "$name.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            trove-*.tar.gz
            trove-*.zip
          retention-days: 1

  # Build the Tauri desktop bundles (macOS universal / Linux / Windows) and
  # attach them to the SAME release as the CLI. Signing runs only when an
  # APPLE_CERTIFICATE secret is present; otherwise the macOS build is unsigned.
  # The temp-keychain password is generated here at runtime, never stored, and
  # nothing account-specific (identity/team) is hardcoded — it all comes from
  # secrets, so a fork with no secrets simply builds unsigned.
  build-desktop:
    name: Build desktop ${{ matrix.label }}
    needs: test
    if: ${{ !inputs.crate_only }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-universal
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - label: linux-x86_64
            os: ubuntu-22.04
            rust-targets: ""
            args: ""
          - label: windows-x86_64
            os: windows-latest
            rust-targets: ""
            args: ""
    defaults:
      run:
        working-directory: trove-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: trove-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2.7.3
        with:
          workspaces: trove-desktop/src-tauri
          key: release-desktop-${{ matrix.label }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file

      - run: npm ci

      - name: Set desktop version from tag
        # Fires on a tag push AND a manual re-release dispatch (where the tag
        # arrives via inputs.tag, not github.ref).
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        shell: bash
        env:
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          python3 - <<'EOF'
          import json, os, pathlib, re
          ver = os.environ["REF_NAME"].lstrip("v")
          tc = pathlib.Path("src-tauri/tauri.conf.json")
          c = json.loads(tc.read_text()); c["version"] = ver
          tc.write_text(json.dumps(c, indent=2) + "\n")
          pj = pathlib.Path("package.json")
          p = json.loads(pj.read_text()); p["version"] = ver
          pj.write_text(json.dumps(p, indent=2) + "\n")
          cg = pathlib.Path("src-tauri/Cargo.toml")
          txt = re.sub(r'(?m)^version = "[^"]*"', f'version = "{ver}"', cg.read_text(), count=1)
          cg.write_text(txt)
          print(f"desktop version set to {ver}")
          EOF

      - name: Detect macOS signing + generate ephemeral keychain password
        id: signing
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
        shell: bash
        run: |
          if [ -n "$CERT" ]; then
            echo "have_cert=true" >> "$GITHUB_OUTPUT"
            # Throwaway password for the temp keychain tauri-action creates on
            # the runner — generated here, never stored as a secret.
            echo "KEYCHAIN_PASSWORD=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE present — signed macOS build."
          else
            echo "have_cert=false" >> "$GITHUB_OUTPUT"
            echo "No APPLE_CERTIFICATE — unsigned build (opens via right-click -> Open)."
          fi

      - name: Build desktop bundles — signed macOS (cert present)
        if: matrix.label == 'macos-universal' && steps.signing.outputs.have_cert == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          # Signing identity + team come from secrets, not the source, so a fork
          # never references this account. KEYCHAIN_PASSWORD is inherited from
          # $GITHUB_ENV (generated above).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: trove-desktop
          args: ${{ matrix.args }}

      - name: Build desktop bundles — unsigned (Linux/Windows, or macOS w/o cert)
        if: matrix.label != 'macos-universal' || steps.signing.outputs.have_cert != 'true'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: trove-desktop
          args: ${{ matrix.args }}

      - name: Collect distributable bundles
        shell: bash
        run: |
          set -eu
          mkdir -p bundles
          find src-tauri/target -type f -path '*/bundle/*' \
            \( -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.exe' -o -name '*.app.tar.gz' \) \
            -exec cp {} bundles/ \;
          ls -la bundles/

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: trove-desktop/bundles/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [build, build-desktop]
    if: ${{ !inputs.crate_only }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (CHANGELOG.md + release-notes tooling)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build SHA256SUMS
        shell: bash
        run: |
          set -eux
          cd dist
          # Checksum every asset except the sums file itself. A loop (not
          # `xargs`) so bundle names containing spaces — e.g. "Trove Desktop_…" —
          # aren't word-split.
          : > SHA256SUMS
          for f in *; do
            if [ "$f" != SHA256SUMS ]; then
              shasum -a 256 "$f" >> SHA256SUMS
            fi
          done
          cat SHA256SUMS

      - name: Generate release notes from CHANGELOG.md
        # Reuses the github-guard changelog guard, which ALSO enforces (pre-push)
        # that this version's section exists — so the release body can never drift
        # from the committed CHANGELOG.md. One source of truth.
        shell: bash
        env:
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          .githooks/pre-push.d/git-changelog.sh notes "$REF_NAME" > release-notes.md
          echo "----- release notes -----"; cat release-notes.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: trove ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release-notes.md
          # Upload everything that was checksummed above (CLI tarballs/zip + every
          # desktop bundle, whatever tauri named it) so the uploaded set can't
          # drift from SHA256SUMS.
          files: dist/*

  # Publish the trove-core library to crates.io via crates.io Trusted
  # Publishing (GitHub OIDC) — the trusted publisher is registered against THIS
  # workflow (release.yml). No stored CARGO_REGISTRY_TOKEN. Only the library is
  # published; the binaries ship as the GitHub Release above. Idempotent: skips
  # if the version is already on crates.io. Attacker-influenced values reach the
  # shell via env (never interpolated into run: bodies); actions are SHA-pinned.
  publish-crate:
    name: Publish trove-core to crates.io
    needs: release
    # Runs after the GitHub Release on a tag push / full dispatch, OR standalone
    # on a `crate_only` dispatch (targeted re-publish without rebuilding or
    # overwriting the Release). Guarded so a failed/absent build never reaches
    # the publish step.
    if: ${{ always() && !cancelled() && (inputs.crate_only || needs.release.result == 'success') }}
    runs-on: ubuntu-latest
    # The crates.io Trusted Publishing config requires this environment name —
    # the OIDC JWT must carry it, so the job must declare it.
    environment: release
    permissions:
      contents: read
      id-token: write # required for crates.io OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0 # full history so the on-main ancestry check works

      # A tag can point at any commit; only publish tags contained in main.
      - name: Refuse to publish a tag that is not on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor HEAD FETCH_HEAD; then
            echo "::error::refusing to publish — this tag's commit is not contained in main"
            exit 1
          fi
          echo "tag commit is on main; proceeding"

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, pinned
        with:
          toolchain: stable

      - name: Resolve and verify version
        id: version
        shell: bash
        env:
          RAW_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${RAW_TAG#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "trove-core") | .version')"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "::error::tag $RAW_TAG (version $tag_version) does not match trove-core crate version $crate_version"
            exit 1
          fi
          echo "version=$crate_version" >> "$GITHUB_OUTPUT"
          echo "Publishing trove-core $crate_version"

      - name: Skip if version already on crates.io
        id: check
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          code="$(curl -sSL -o resp.json -w '%{http_code}' https://crates.io/api/v1/crates/trove-core || echo 000)"
          if [ "$code" = "404" ]; then
            echo "trove-core not yet on crates.io — first publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "$code" = "200" ] && jq -e --arg v "$VERSION" 'any(.versions[]; .num == $v)' resp.json >/dev/null; then
            echo "trove-core $VERSION already published — skipping upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "trove-core $VERSION not found on crates.io (HTTP $code) — will publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to crates.io (OIDC)
        if: steps.check.outputs.skip != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        # Idempotent: if the API skip-check missed it (e.g. index lag on a
        # re-cut of the same tag), crates.io still rejects a duplicate version —
        # treat that specific "already exists" case as success, fail on anything
        # else.
        run: |
          if cargo publish -p trove-core 2> publish.err; then
            cat publish.err >&2 || true
          else
            cat publish.err >&2
            # crates.io reports a duplicate version as "already exists" OR
            # "already uploaded" depending on the path — accept either, fail else.
            if grep -qiE 'already (exists|uploaded)' publish.err; then
              echo "trove-core version already published — idempotent, treating as success."
            else
              exit 1
            fi
          fi
