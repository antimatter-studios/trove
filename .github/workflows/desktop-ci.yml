# trove-desktop CI (monorepo)
#
# The Tauri GUI lives in `trove-desktop/` and is EXCLUDED from the Cargo
# workspace (see root Cargo.toml), so the core CI (ci.yml) never builds it.
# This workflow covers the desktop app on its own: the React/Vite frontend
# (vitest) and the Tauri Rust backend (fmt / clippy / test), built by its own
# manifest against the workspace `trove-core` (path dep).
#
# Runs on EVERY PR (no `paths:` filter) but gates the real jobs behind a
# `changes` step: on a non-desktop PR the frontend/backend jobs skip, so their
# `Frontend (vitest)` / `Backend (rust)` checks report `skipped` — which GitHub
# counts as a pass for a required check. A desktop PR (or a change to this
# workflow) flips `changes.desktop` true and the jobs run for real.
#
# Why not `paths:` filtering? A path-filtered workflow never *reports* its
# checks on a non-matching PR, so once branch protection requires those checks
# (github-guard auto-discovers them from a desktop PR run), every core-only PR
# waits forever on checks that can't complete. Always-run + skip avoids that
# deadlock while still gating desktop changes.

name: Desktop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: trove-desktop

jobs:
  # Detect whether this PR/push touches the desktop app. The real jobs below
  # gate on this, so they run only for desktop changes — but the workflow still
  # triggers on every PR, so the required checks always get reported.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            desktop:
              - 'trove-desktop/**'
              - '.github/workflows/desktop-ci.yml'

  frontend:
    name: Frontend (vitest)
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: trove-desktop/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test

  backend:
    name: Backend (rust)
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: trove-desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: trove-desktop/package-lock.json

      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file

      # `tauri::generate_context!` embeds the built frontend at compile time, so
      # the Rust crate won't compile (clippy/test included) until `dist/` exists.
      - name: Build frontend (required to compile the Rust crate)
        run: npm ci && npm run build

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
