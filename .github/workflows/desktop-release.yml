# trove-desktop release pipeline (monorepo)
#
# Fires on a `desktop-v<CalVer>` tag (e.g. `desktop-v2026.7.18`) — or manual
# dispatch — and builds the Tauri desktop bundles on native runners via
# tauri-action, attaching them to a DRAFT GitHub Release on the trove repo:
#   * macOS  (universal)  Trove_<version>_universal.dmg   (+ .app)
#   * Linux  (x86_64)     trove-desktop_<version>_amd64.deb / .AppImage
#   * Windows (x86_64)    Trove_<version>_x64-setup.exe    (NSIS)
#
# The `desktop-v` prefix keeps these tags disjoint from the CLI/library release
# (release.yml), which fires on `v*` — `desktop-v…` starts with `d`, so the two
# never cross-trigger.
#
# The app lives in `trove-desktop/`; run steps use it as their working
# directory and tauri-action is pointed at it via `projectPath`.
#
# Homebrew is NOT published from here (the tap PULLS a published Release).
# macOS signing: tauri.conf.json hardcodes the Developer ID identity. On CI the
# cert is imported by tauri-action when APPLE_CERTIFICATE is set (then
# notarization + stapling when the notarization triple is present). Until those
# secrets exist the build strips the signing config and produces an unsigned
# .app instead of failing on a missing keychain item.

name: Desktop Release

on:
  push:
    tags:
      - "desktop-v20[0-9][0-9].*.*"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: trove-desktop

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (universal)
            platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - label: Linux (x86_64)
            platform: ubuntu-22.04
            rust-targets: ""
            args: ""
          - label: Windows (x86_64)
            platform: windows-latest
            rust-targets: ""
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: trove-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: trove-desktop/src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file

      - run: npm ci

      - name: Set release version from tag
        # On a tag push the tag IS the version (desktop-v2026.7.18 → 2026.7.18).
        # Write it into every place Tauri/npm/cargo reads a version from so the
        # bundle, the .dmg filename, and the crate all agree. Skipped on dispatch.
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'EOF'
          import json, os, pathlib, re
          ref = os.environ["REF_NAME"]
          ver = ref[len("desktop-v"):] if ref.startswith("desktop-v") else ref.lstrip("v")

          tc = pathlib.Path("src-tauri/tauri.conf.json")
          c = json.loads(tc.read_text()); c["version"] = ver
          tc.write_text(json.dumps(c, indent=2) + "\n")

          pj = pathlib.Path("package.json")
          p = json.loads(pj.read_text()); p["version"] = ver
          pj.write_text(json.dumps(p, indent=2) + "\n")

          cg = pathlib.Path("src-tauri/Cargo.toml")
          # Only the top-level (column-0) `version = "..."` — never dependency
          # versions, which are indented or written as `foo = { version = ... }`.
          txt = re.sub(r'(?m)^version = "[^"]*"', f'version = "{ver}"', cg.read_text(), count=1)
          cg.write_text(txt)
          print(f"version set to {ver}")
          EOF

      - name: Strip macOS signing config when no cert secret
        # tauri.conf.json hardcodes the Developer ID identity. CI has no matching
        # cert in its keychain unless APPLE_CERTIFICATE is provided; when absent,
        # drop the signing section so the build produces an unsigned .app instead
        # of failing with "The specified item could not be found in the keychain."
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE == ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        shell: bash
        run: |
          python3 - <<'EOF'
          import json, pathlib
          p = pathlib.Path("src-tauri/tauri.conf.json")
          c = json.loads(p.read_text())
          c.get("bundle", {}).pop("macOS", None)
          p.write_text(json.dumps(c, indent=2) + "\n")
          print("Stripped bundle.macOS — CI build will be unsigned")
          EOF

      - name: Build & upload (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization. tauri-action imports the cert into a
          # temp keychain when APPLE_CERTIFICATE is set; stapling runs once the
          # notarization triple (APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID) is
          # also present. Absent → the strip step above produced an unsigned .app.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: trove-desktop
          # Attach to a release only on a tag push.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Trove Desktop {0}', github.ref_name) || '' }}
          releaseBody: ${{ startsWith(github.ref, 'refs/tags/') && format('Automated desktop build for `{0}`.', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Publish the SHA256SUMS asset the tap reads. Runs once, after every platform
  # has uploaded its artifacts to the (draft) Release.
  checksums:
    name: Publish SHA256SUMS
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Download release assets, checksum, and re-upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p dist && cd dist
          # Draft releases are visible to the token that owns the run.
          gh release download "$TAG" --repo "$REPO" --pattern '*' --skip-existing
          shasum -a 256 * > SHA256SUMS
          cat SHA256SUMS
          gh release upload "$TAG" SHA256SUMS --repo "$REPO" --clobber
