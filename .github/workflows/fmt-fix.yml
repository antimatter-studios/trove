# Manual rustfmt runner.
#
# This workflow only runs on workflow_dispatch — it does NOT run on push or PR.
# It runs `cargo fmt --all` and uploads the resulting diff as an artifact so
# you can review and apply locally. It intentionally does NOT commit / push
# changes back to the repo (auto-formatting in CI is opt-in by design).

name: Fmt Fix

on:
  workflow_dispatch:

jobs:
  fmt-fix:
    name: Fmt Fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --all
        run: cargo fmt --all

      - name: Produce diff
        run: |
          git diff --stat
          git diff > fmt-fix.patch || true
          if [ -s fmt-fix.patch ]; then
            echo "rustfmt produced changes; download the artifact and apply with 'git apply fmt-fix.patch'."
          else
            echo "Tree is already fmt-clean; no patch produced."
          fi

      - name: Upload patch artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fmt-fix-patch
          path: fmt-fix.patch
          if-no-files-found: ignore
